name: Build & Deploy to IBM Cloud Code Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  IBM_REGION: jp-tok
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/tco-calculator

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: Tech9labs/TCO_ROI_Calculator
          path: _frontend
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & build frontend
        working-directory: _frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build → public/
        run: |
          mkdir -p public
          cp -r _frontend/dist/. public/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Install IBM Cloud CLI & plugins
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine -f

      - name: Login to IBM Cloud
        run: ibmcloud login --apikey ${{ secrets.IBM_CLOUD_API_KEY }} -r ${{ env.IBM_REGION }} -g tco_calculator

      - name: Create GitHub registry secret in Code Engine (idempotent)
        run: |
          ibmcloud ce project select --name ${{ secrets.IBM_CE_PROJECT }}
          ibmcloud ce registry create \
            --name ghcr-secret \
            --server ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GH_PAT }} 2>/dev/null || true

      - name: Deploy to IBM Cloud Code Engine
        run: |
          ibmcloud ce project select --name ${{ secrets.IBM_CE_PROJECT }}

          if ibmcloud ce application get --name tco-calculator > /dev/null 2>&1; then
            ibmcloud ce application update \
              --name tco-calculator \
              --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --registry-secret ghcr-secret \
              --port 3000 \
              --min-scale 1 \
              --env DATABASE_URL="${{ secrets.DATABASE_URL }}?sslmode=require" \
              --env JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --env ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
              --env NODE_ENV=production \
              --no-wait
          else
            ibmcloud ce application create \
              --name tco-calculator \
              --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --registry-secret ghcr-secret \
              --port 3000 \
              --min-scale 1 \
              --env DATABASE_URL="${{ secrets.DATABASE_URL }}?sslmode=require" \
              --env JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --env ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
              --env NODE_ENV=production \
              --no-wait
          fi

name: Build & Deploy to IBM Cloud Code Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  IBM_REGION: jp-tok
  IBM_CR_HOSTNAME: icr.io
  IMAGE_NAME: tco-calculator

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: Tech9labs/TCO_ROI_Calculator
          path: _frontend
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & build frontend
        working-directory: _frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build → public/
        run: |
          mkdir -p public
          cp -r _frontend/dist/. public/

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IBM_CR_HOSTNAME }}/${{ secrets.IBM_CR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag \
            ${{ env.IBM_CR_HOSTNAME }}/${{ secrets.IBM_CR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ env.IBM_CR_HOSTNAME }}/${{ secrets.IBM_CR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

      - name: Install IBM Cloud CLI & plugins
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install container-registry -f
          ibmcloud plugin install code-engine -f

      - name: Login to IBM Cloud
        run: ibmcloud login --apikey ${{ secrets.IBM_CLOUD_API_KEY }} -r ${{ env.IBM_REGION }} -g tco_calculator

      - name: Login to IBM Container Registry & push image
        run: |
          ibmcloud cr region-set global
          ibmcloud cr login
          docker push ${{ env.IBM_CR_HOSTNAME }}/${{ secrets.IBM_CR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IBM_CR_HOSTNAME }}/${{ secrets.IBM_CR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

      - name: Clean up old images (keep latest 2 only)
        run: |
          ibmcloud cr region-set global
          OLD_IMAGES=$(ibmcloud cr images --restrict ${{ secrets.IBM_CR_NAMESPACE }}/${{ env.IMAGE_NAME }} --format "{{.Repository}}:{{.Tag}}" 2>/dev/null \
            | grep -v ":latest" | grep -v ":${{ github.sha }}" || true)
          if [ -n "$OLD_IMAGES" ]; then
            echo "Removing old images:"
            echo "$OLD_IMAGES"
            echo "$OLD_IMAGES" | xargs -r ibmcloud cr image-rm
          fi

      - name: Create registry secret in Code Engine (idempotent)
        run: |
          ibmcloud ce project select --name ${{ secrets.IBM_CE_PROJECT }}
          ibmcloud ce registry create \
            --name ibm-cr-secret \
            --server ${{ env.IBM_CR_HOSTNAME }} \
            --username iamapikey \
            --password ${{ secrets.IBM_CLOUD_API_KEY }} 2>/dev/null || true

      - name: Deploy to IBM Cloud Code Engine
        run: |
          ibmcloud ce project select --name ${{ secrets.IBM_CE_PROJECT }}

          if ibmcloud ce application get --name ${{ env.IMAGE_NAME }} > /dev/null 2>&1; then
            ibmcloud ce application update \
              --name ${{ env.IMAGE_NAME }} \
              --image ${{ env.IBM_CR_HOSTNAME }}/${{ secrets.IBM_CR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --registry-secret ibm-cr-secret \
              --port 3000 \
              --min-scale 1 \
              --env DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              --env JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --env ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
              --env NODE_ENV=production \
              --no-wait
          else
            ibmcloud ce application create \
              --name ${{ env.IMAGE_NAME }} \
              --image ${{ env.IBM_CR_HOSTNAME }}/${{ secrets.IBM_CR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --registry-secret ibm-cr-secret \
              --port 3000 \
              --min-scale 1 \
              --env DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              --env JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --env ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
              --env NODE_ENV=production \
              --no-wait
          fi
